<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EV Intelligence Dashboard</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background: #0f1117; color: #e0e0e0; padding: 24px; }
        h1 { color: #4fc3f7; margin-bottom: 8px; }
        .meta { color: #666; font-size: 13px; margin-bottom: 24px; }
        .btn { background: #4fc3f7; color: #000; border: none; padding: 10px 24px;
               border-radius: 6px; cursor: pointer; font-size: 14px; font-weight: 600; }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
                gap: 20px; margin-top: 24px; }
        .card { background: #1a1d2e; border: 1px solid #2a2d3e; border-radius: 10px; padding: 20px; }
        .card h2 { color: #4fc3f7; font-size: 15px; margin-bottom: 12px; }
        .card-content { font-size: 13px; line-height: 1.7; color: #ccc; white-space: pre-wrap; }
        .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid #333;
                   border-top-color: #4fc3f7; border-radius: 50%; animation: spin 0.8s linear infinite;
                   margin-right: 8px; vertical-align: middle; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { margin-top: 12px; font-size: 13px; color: #888; min-height: 20px; }
        .empty { color: #444; font-style: italic; }
    </style>
</head>
<body>
    <h1>⚡ EV Intelligence Dashboard</h1>
    <p class="meta">Powered by Claude + Tavily — latest developments in e-mobility</p>

    <button class="btn" id="refreshBtn" onclick="startResearch()">Run Research</button>
    <div class="status" id="statusMsg"></div>

    <div class="grid" id="resultsGrid">
        <div class="card"><h2>Vehicle-to-Grid (V2G)</h2>
            <div class="card-content empty">Click "Run Research" to load.</div></div>
        <div class="card"><h2>Charging Infrastructure</h2>
            <div class="card-content empty">Click "Run Research" to load.</div></div>
        <div class="card"><h2>Policy & Regulation</h2>
            <div class="card-content empty">Click "Run Research" to load.</div></div>
    </div>

    <script>
        let polling = null;

        async function startResearch() {
            await fetch('/api/refresh', { method: 'POST' });
            document.getElementById('refreshBtn').disabled = true;
            document.getElementById('statusMsg').innerHTML =
                '<span class="spinner"></span>Researching all topics...';
            polling = setInterval(checkStatus, 3000);
        }

        async function checkStatus() {
            const res = await fetch('/api/status');
            const data = await res.json();
            if (data.status === 'done' || data.status === 'error') {    // to hanle error status
                clearInterval(polling);
                document.getElementById('refreshBtn').disabled = false;
                document.getElementById('statusMsg').textContent =
                    'Last updated: ' + data.last_updated;
                loadResults();
            }
        }

        async function loadResults() {
            const res = await fetch('/api/results');
            const data = await res.json();
            const grid = document.getElementById('resultsGrid');
            grid.innerHTML = '';
            for (const key in data) {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `<h2>${data[key].label}</h2>
                    <div class="card-content">${data[key].content}</div>`;
                grid.appendChild(card);
            }
        }

        window.onload = async function() {
            const res = await fetch('/api/status');
            const data = await res.json();
            if (data.status === 'done') {
                document.getElementById('statusMsg').textContent =
                    'Last updated: ' + data.last_updated;
                loadResults();
            } else if (data.status === 'running') {
                document.getElementById('refreshBtn').disabled = true;
                document.getElementById('statusMsg').innerHTML =
                    '<span class="spinner"></span>Researching all topics...';
                polling = setInterval(checkStatus, 3000);
            }
        }
    </script>
</body>
</html>
